<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Landing Afiliados</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial;
      color: white;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      transition: 1s;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      top: 35%;
    }

    h1 {
      font-size: 40px;
    }

    button {
      padding: 12px 25px;
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 25px;
    }

    .cinta {
      position: absolute;
      bottom: 60px;
      width: 100%;
      background: rgba(0,0,0,0.7);
      white-space: nowrap;
      overflow: hidden;
    }

    .cinta span {
      display: inline-block;
      padding-left: 100%;
      animation: move 12s linear infinite;
      color: yellow;
      font-weight: bold;
    }

    .cinta2 {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      white-space: nowrap;
      overflow: hidden;
    }

    .cinta2 span {
      display: inline-block;
      padding-left: 100%;
      animation: move 18s linear infinite;
      color: lightgreen;
      font-weight: bold;
    }

    @keyframes move {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="content">
  <h1>Bienvenido a tu Zona de Ofertas</h1>
  <p>Afiliados + productos propios en un solo lugar</p>
  <button>Ver Ofertas</button>
</div>

<div class="cinta">
  <span>Dios es amor • Dios es amor • Dios es amor • Dios es amor •</span>
</div>

<div class="cinta2">
  <span>Ama y armonizarás con Dios • Ama y armonizarás con Dios •</span>
</div>

<audio id="music" autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_d0b1b8c5c6.mp3" type="audio/mp3">
</audio>

<script>
  let bg = document.getElementById("bg");
  let music = document.getElementById("music");

  function cambiarFondo() {
    bg.style.backgroundImage =
      "url('https://source.unsplash.com/random/1920x1080/?business,technology,nature&" + Date.now() + "')";
  }

  cambiarFondo();
  setInterval(cambiarFondo, 10000);

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      music.pause();
    } else {
      music.play();
    }
  });
</script>

</body>
</html>
